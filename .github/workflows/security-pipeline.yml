name: Cloud Compliance Dashboard Pipeline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-security:
    name: Terraform Validate & Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          quiet: true
          soft_fail: true
          skip_check: CKV_AWS_117,CKV_AWS_272,CKV_AWS_116,CKV_AWS_115,CKV_AWS_50,CKV2_AWS_64,CKV_AWS_144,CKV_AWS_18,CKV_AWS_21,CKV2_AWS_61,CKV2_AWS_6,CKV_AWS_119,CKV_AWS_28,CKV_AWS_74,CKV2_AWS_62

  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic httpx pytest pytest-cov

      - name: Run pytest
        run: python -m pytest tests/test_main.py -v --tb=short
